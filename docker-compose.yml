version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: car-vault-backend
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      FRONTEND_URL: "http://localhost"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:3001"
    container_name: car-vault-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
