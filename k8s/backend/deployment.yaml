apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-vault-backend
  namespace: car-vault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-vault-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero downtime — always keep 2 pods running
  template:
    metadata:
      labels:
        app: car-vault-backend
    spec:
      containers:
        - name: backend
          # Replace YOUR_ACCOUNT_ID with your AWS account ID
          image: YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/car-vault/backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:           # blocks traffic until pod is ready
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:            # restarts pod if it stops responding
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
